name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare config
        run: |
          mkdir -p config
          cp config.jsonc.example config/config.jsonc

      - name: Build test image
        run: docker build -t llm-rosetta-gateway:test .

      - name: Start container
        run: |
          docker run -d --name llm-rosetta-smoke \
            -p 8000:8000 \
            -v "$PWD/config:/app/config" \
            llm-rosetta-gateway:test

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl --silent --show-error --fail http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs llm-rosetta-smoke
          exit 1

      - name: Verify admin panel and model endpoint
        run: |
          curl --fail http://127.0.0.1:8000/admin/ > /tmp/admin.html
          curl --fail http://127.0.0.1:8000/v1/models > /tmp/models.json
          grep -qi "<html" /tmp/admin.html
          grep -q "\"data\"" /tmp/models.json || grep -q "\"object\"" /tmp/models.json

      - name: Print container logs on failure
        if: failure()
        run: docker logs llm-rosetta-smoke

      - name: Cleanup
        if: always()
        run: docker rm -f llm-rosetta-smoke || true

  build-and-push:
    runs-on: ubuntu-latest
    needs: smoke-test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        if: github.event_name != 'pull_request'
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: sbom
          path: sbom.spdx.json

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # 这里添加你的部署逻辑，例如：
          # - SSH 到服务器并拉取最新镜像
          # - 使用 docker-compose 重新部署
          # - 触发 Kubernetes 滚动更新等

          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Deployment complete!"
