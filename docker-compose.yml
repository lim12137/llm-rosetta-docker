version: '3.8'

services:
  llm-rosetta:
    image: ${LLM_ROSETTA_IMAGE:-ghcr.io/lim12137/llm-rosetta-docker:latest}
    container_name: llm-rosetta-gateway
    restart: unless-stopped
    ports:
      - "8801:8000"
    volumes:
      # 持久化配置、管理面板数据和日志
      - ./config:/app/config
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - llm-network

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
networks:
  llm-network:
    driver: bridge
