version: '3.8'

services:
  llm-rosetta:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-rosetta-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # LLM-Rosetta 网关配置
      - LOG_LEVEL=info
      - PORT=8000
      - HOST=0.0.0.0

      # 上游提供商配置（示例）
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}

      # Anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}

      # Google GenAI
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}

      # 其他可选配置
      - MAX_REQUEST_SIZE=10485760  # 10MB
      - ENABLE_CORS=true
      - ALLOWED_ORIGINS=*

    volumes:
      # 持久化配置和日志
      - ./config:/app/config
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - llm-network

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # 可选：添加 Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: llm-rosetta-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - llm-rosetta
    networks:
      - llm-network
    profiles:
      - production

networks:
  llm-network:
    driver: bridge

volumes:
  config:
  logs:
