services:
  llm-rosetta:
    image: ${LLM_ROSETTA_IMAGE:-ghcr.io/lim12137/llm-rosetta-docker:latest}
    container_name: llm-rosetta-gateway
    restart: unless-stopped
    ports:
      - "${LLM_ROSETTA_PORT:-8765}:8765"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_BASE_URL: ${GOOGLE_BASE_URL:-https://generativelanguage.googleapis.com}
    volumes:
      - ./config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
