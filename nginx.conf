events {
    worker_connections 1024;
}

http {
    upstream llm_rosetta {
        server llm-rosetta:8000;
        keepalive 64;
    }

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        client_max_body_size 10M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        location /health {
            proxy_pass http://llm_rosetta/health;
            access_log off;
        }

        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://llm_rosetta/v1/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, x-provider-target' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        location /admin/ {
            auth_basic "LLM-Rosetta Admin";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://llm_rosetta/admin/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = / {
            return 302 /admin/;
        }
    }
}
